acrServer: ""
aksIdentityClientId: ""
aksKubeletIdentityClientId: ""
tenantId: ""
storageAccountName: ""
serviceBusNamespace: ""
serviceBusQueueName: "document-processing"
aiFoundryOpenAiEndpoint: ""
modelName: ""
keyVault:
  name: ""
  qdrantApiKeySecretName: "qdrant-api-key"
  qdrantReadOnlyApiKeySecretName: "qdrant-readonly-api-key"
  applicationInsightsConnectionStringSecretName: "appinsights-connection-string"
  # Enable automatic secret rotation from Key Vault (CSI driver polls for changes)
  rotationPollInterval: "2m"

# Stakater Reloader - automatically restarts pods when secrets/configmaps change
reloader:
  enabled: true
  fullnameOverride: "reloader"
  reloader:
    watchGlobally: false # Only watch resources in the same namespace

qdrant:
  enabled: true
  persistence:
    enabled: true
    size: 128Gi
    storageClassName: "managed-premium"
  resources:
    requests:
      memory: "24Gi"
      cpu: "6"
    limits:
      memory: "30Gi"
      cpu: "8"
  nodeSelector:
    kubernetes.azure.com/agentpool: cpupool
  # Stakater Reloader annotation - explicitly watch the CSI-synced secret
  podAnnotations:
    secret.reloader.stakater.com/reload: "colpali-stack-app-secrets"

  # Pass API keys via environment variables referencing the CSI-synced secret
  # This ensures the API key is read fresh from the CSI secret on each pod restart
  # Qdrant reads these as QDRANT__SERVICE__API_KEY format
  env:
    - name: QDRANT__SERVICE__API_KEY
      valueFrom:
        secretKeyRef:
          name: "colpali-stack-app-secrets"
          key: qdrant-api-key
    - name: QDRANT__SERVICE__READ_ONLY_API_KEY
      valueFrom:
        secretKeyRef:
          name: "colpali-stack-app-secrets"
          key: qdrant-readonly-api-key

# Document Processor
documentProcessor:
  enabled: true
  replicaCount: 2
  imageTag: "latest"

  processing:
    # Document-level concurrency (controlled by Service Bus receiver)
    documentMaxConcurrent: 3
    # ColPali GPU embedding concurrency and batching
    colpaliMaxConcurrent: 5
    colpaliBatchSize: 1
    # Azure Blob storage concurrency
    blobMaxConcurrent: 250
    # Qdrant indexing concurrency and batching
    qdrantMaxConcurrent: 5
    qdrantBatchSize: 20

  resources:
    requests:
      memory: "4Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "2"

  healthcheck:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 3

  deployment:
    strategy:
      maxSurge: 1
      maxUnavailable: 0
    terminationGracePeriodSeconds: 120

  dependencies:
    waitForColPali: true
    waitForQdrant: true
    initContainer:
      image: "curlimages/curl:8.5.0"
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"

agentApi:
  enabled: true
  replicaCount: 1
  imageTag: "latest"

  service:
    port: 8000
    targetPort: 8080

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"

  healthcheck:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 3

agentUi:
  enabled: true
  replicaCount: 1
  imageTag: "latest"

  service:
    port: 80
    targetPort: 8080

  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "500m"

  healthcheck:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 3

colpaliInference:
  enabled: true
  replicaCount: 1
  imageTag: "latest"

  # GPU node pool for inference workloads
  # Set to "gpuinference" to use the new dedicated inference pool
  nodePool: "gpuinference"

  # Model configuration
  modelId: "TomoroAI/tomoro-colqwen3-embed-4b"
  model:
    modelDirectory: "/tmp/model-directory"
    storageSize: "Gi"

  resources:
    requests:
      memory: "64Gi"
      cpu: "8"
    limits:
      memory: "128Gi"
      cpu: "12"

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  statefulSet:
    updateStrategy:
      type: RollingUpdate
      partition: 0
    terminationGracePeriodSeconds: 300

ingress-nginx-agent-ui:
  enabled: true
  controller:
    ingressClassName: nginx-agent-ui
    ingressClassResource:
      name: nginx-agent-ui
      controllerValue: k8s.io/ingress-nginx-agent-ui
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
        service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: tcp

ingress-nginx-colpali:
  enabled: false
  controller:
    ingressClassName: nginx-colpali
    ingressClassResource:
      name: nginx-colpali
      controllerValue: k8s.io/ingress-nginx-colpali
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
        service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: tcp

ingress-nginx-qdrant:
  enabled: false
  controller:
    ingressClassName: nginx-qdrant
    ingressClassResource:
      name: nginx-qdrant
      controllerValue: k8s.io/ingress-nginx-qdrant
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
        service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: tcp
