acrServer: ""
aksIdentityClientId: ""
aksKubeletIdentityClientId: ""
tenantId: ""
storageAccountName: ""
serviceBusNamespace: ""
serviceBusQueueName: "document-processing"
aiFoundryOpenAiEndpoint: ""
modelName: ""
keyVault:
  name: ""
  qdrantApiKeySecretName: "qdrant-api-key"
  qdrantReadOnlyApiKeySecretName: "qdrant-readonly-api-key"
  applicationInsightsConnectionStringSecretName: "appinsights-connection-string"

qdrant:
  enabled: true
  persistence:
    enabled: true
    size: 10Gi
    storageClass: "managed-premium"
  resources:
    requests:
      memory: "16Gi"
      cpu: "2"
    limits:
      memory: "24Gi"
      cpu: "4"
  nodeSelector:
    kubernetes.azure.com/agentpool: cpupool

  apiKey:
    valueFrom:
      secretKeyRef:
        name: "colpali-stack-app-secrets"
        key: qdrant-api-key
  readOnlyApiKey:
    valueFrom:
      secretKeyRef:
        name: "colpali-stack-app-secrets"
        key: qdrant-readonly-api-key

# Document Processor
documentProcessor:
  enabled: true
  replicaCount: 2
  imageTag: "latest"

  processing:
    maxConcurrentServiceBusMessages: 3
    pageProcessingBatchSize: 4
    maxConcurrentPageBatches: 8
    colpaliMaxConcurrentRequests: 5

  resources:
    requests:
      memory: "4Gi"
      cpu: "1"
    limits:
      memory: "8Gi"
      cpu: "2"

  healthcheck:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 3

  deployment:
    strategy:
      maxSurge: 1
      maxUnavailable: 0
    terminationGracePeriodSeconds: 120

  dependencies:
    waitForColqwen: true
    waitForQdrant: true
    initContainer:
      image: "curlimages/curl:8.5.0"
      resources:
        requests:
          memory: "64Mi"
          cpu: "100m"
        limits:
          memory: "128Mi"
          cpu: "200m"

agentApi:
  enabled: true
  replicaCount: 1
  imageTag: "latest"

  service:
    type: ClusterIP
    port: 8000
    targetPort: 8080

  resources:
    requests:
      memory: "2Gi"
      cpu: "500m"
    limits:
      memory: "4Gi"
      cpu: "1000m"

  healthcheck:
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 15
    failureThreshold: 3

agentUi:
  enabled: true
  replicaCount: 1
  imageTag: "latest"

  service:
    type: LoadBalancer
    port: 80
    targetPort: 8080

  resources:
    requests:
      memory: "1Gi"
      cpu: "250m"
    limits:
      memory: "2Gi"
      cpu: "500m"

  healthcheck:
    initialDelaySeconds: 30
    periodSeconds: 20
    timeoutSeconds: 10
    failureThreshold: 3

colqwenInference:
  enabled: true
  replicaCount: 1
  imageTag: "latest"

  # Model configuration
  model:
    modelDirectory: "/tmp/model-directory"
    storageSize: "30Gi"

  resources:
    requests:
      memory: "64Gi"
      cpu: "8"
    limits:
      memory: "128Gi"
      cpu: "12"

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  healthcheck:
    initialDelaySeconds: 600
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 5

  statefulSet:
    updateStrategy:
      type: RollingUpdate
      partition: 0
    terminationGracePeriodSeconds: 300

ingress-nginx:
  enabled: false
  controller:
    service:
      type: LoadBalancer
      externalTrafficPolicy: Local
      annotations:
        service.beta.kubernetes.io/azure-load-balancer-health-probe-request-path: /healthz
        service.beta.kubernetes.io/azure-load-balancer-health-probe-protocol: tcp
