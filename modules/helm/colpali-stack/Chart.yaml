apiVersion: v2
name: colpali-stack
description: Simple ColPali Stack - Qdrant + Ingress + Document Processor
version: 0.1.0

dependencies:
  - name: qdrant
    version: "1.16.2"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
  - name: reloader
    version: "1.2.1"
    repository: "https://stakater.github.io/stakater-charts"
    condition: reloader.enabled
  - name: ingress-nginx
    alias: ingress-nginx-agent-ui
    version: "4.8.3"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx-agent-ui.enabled
  - name: ingress-nginx
    alias: ingress-nginx-colpali
    version: "4.8.3"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx-colpali.enabled
  - name: ingress-nginx
    alias: ingress-nginx-qdrant
    version: "4.8.3"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx-qdrant.enabled
