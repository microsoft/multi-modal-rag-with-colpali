{{- if .Values.documentProcessor.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "colpali-stack.fullname" . }}-document-processor
  labels:
    app: {{ include "colpali-stack.fullname" . }}-document-processor
spec:
  replicas: {{ .Values.documentProcessor.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: {{ .Values.documentProcessor.deployment.strategy.maxSurge | default 1 }}
      maxUnavailable: {{ .Values.documentProcessor.deployment.strategy.maxUnavailable | default 0 }}
  selector:
    matchLabels:
      app: {{ include "colpali-stack.fullname" . }}-document-processor
  template:
    metadata:
      labels:
        app: {{ include "colpali-stack.fullname" . }}-document-processor
        azure.workload.identity/use: "true"
      annotations:
        secret.reloader.stakater.com/reload: "colpali-stack-app-secrets"
    spec:
      serviceAccountName: {{ include "colpali-stack.fullname" . }}-sa
      terminationGracePeriodSeconds: {{ .Values.documentProcessor.deployment.terminationGracePeriodSeconds | default 120 }}
      nodeSelector:
        kubernetes.azure.com/agentpool: cpupool
      {{- if or .Values.documentProcessor.dependencies.waitForColPali .Values.documentProcessor.dependencies.waitForQdrant }}
      initContainers:
      {{- if .Values.documentProcessor.dependencies.waitForColPali }}
      - name: wait-for-colpali
        image: {{ .Values.documentProcessor.dependencies.initContainer.image }}
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for ColPali inference service to be ready..."
          until curl -s -f -o /dev/null "http://{{ include "colpali-stack.fullname" . }}-colpali-inference:{{ .Values.colpaliInference.service.port }}/health"; do
            echo "ColPali inference not ready, waiting 10 seconds..."
            sleep 10
          done
          echo "ColPali inference service is ready!"
        resources:
          requests:
            memory: {{ .Values.documentProcessor.dependencies.initContainer.resources.requests.memory }}
            cpu: {{ .Values.documentProcessor.dependencies.initContainer.resources.requests.cpu }}
          limits:
            memory: {{ .Values.documentProcessor.dependencies.initContainer.resources.limits.memory }}
            cpu: {{ .Values.documentProcessor.dependencies.initContainer.resources.limits.cpu }}
      {{- end }}
      {{- if .Values.documentProcessor.dependencies.waitForQdrant }}
      - name: wait-for-qdrant
        image: {{ .Values.documentProcessor.dependencies.initContainer.image }}
        command:
        - /bin/sh
        - -c
        - |
          echo "Waiting for Qdrant to be ready..."
          until curl -s -f -o /dev/null "http://{{ include "colpali-stack.fullname" . }}-qdrant:6333"; do
            echo "Qdrant not ready, waiting 5 seconds..."
            sleep 5
          done
          echo "Qdrant is ready!"
        resources:
          requests:
            memory: {{ .Values.documentProcessor.dependencies.initContainer.resources.requests.memory }}
            cpu: {{ .Values.documentProcessor.dependencies.initContainer.resources.requests.cpu }}
          limits:
            memory: {{ .Values.documentProcessor.dependencies.initContainer.resources.limits.memory }}
            cpu: {{ .Values.documentProcessor.dependencies.initContainer.resources.limits.cpu }}
      {{- end }}
      {{- end }}
      containers:
      - name: document-processor
        image: "{{ .Values.acrServer }}/document-processor:{{ .Values.documentProcessor.imageTag }}"
        env:
        - name: COLPALI_INFERENCE_ENDPOINT
          value: "http://{{ include "colpali-stack.fullname" . }}-colpali-inference:{{ .Values.colpaliInference.service.port }}"
        - name: DATA_STORAGE_ACCOUNT_NAME
          value: {{ .Values.storageAccountName }}
        - name: SERVICE_BUS_NAMESPACE_NAME
          value: {{ .Values.serviceBusNamespace }}
        - name: SERVICE_BUS_QUEUE_NAME
          value: {{ .Values.serviceBusQueueName | default "document-processing" }}
        - name: AZURE_CLIENT_ID
          value: {{ .Values.aksIdentityClientId }}
        - name: QDRANT_ENDPOINT
          value: "http://{{ include "colpali-stack.fullname" . }}-qdrant:6333"
        - name: QDRANT_API_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "colpali-stack.fullname" . }}-app-secrets
              key: qdrant-api-key
        - name: LOG_LEVEL
          value: "INFO"
        - name: OTEL_SERVICE_NAME
          value: "document-processor"
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: {{ include "colpali-stack.fullname" . }}-app-secrets
              key: appinsights-connection-string
        - name: DOCUMENT_MAX_CONCURRENT
          value: "{{ .Values.documentProcessor.processing.documentMaxConcurrent | default 3 }}"
        - name: COLPALI_MAX_CONCURRENT
          value: "{{ .Values.documentProcessor.processing.colpaliMaxConcurrent | default 5 }}"
        - name: COLPALI_BATCH_SIZE
          value: "{{ .Values.documentProcessor.processing.colpaliBatchSize | default 1 }}"
        - name: BLOB_MAX_CONCURRENT
          value: "{{ .Values.documentProcessor.processing.blobMaxConcurrent | default 250 }}"
        - name: QDRANT_MAX_CONCURRENT
          value: "{{ .Values.documentProcessor.processing.qdrantMaxConcurrent | default 5 }}"
        - name: QDRANT_BATCH_SIZE
          value: "{{ .Values.documentProcessor.processing.qdrantBatchSize | default 20 }}"
        volumeMounts:
        - name: app-secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - "pkill -SIGTERM -f 'python -m src.document_processor.app' && sleep 10"
        resources:
          requests:
            memory: {{ .Values.documentProcessor.resources.requests.memory | quote }}
            cpu: {{ .Values.documentProcessor.resources.requests.cpu | quote }}
          limits:
            memory: {{ .Values.documentProcessor.resources.limits.memory | quote }}
            cpu: {{ .Values.documentProcessor.resources.limits.cpu | quote }}
        {{- if .Values.documentProcessor.healthcheck }}
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "pgrep -f 'python -m src.document_processor.app' > /dev/null"
          initialDelaySeconds: {{ .Values.documentProcessor.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.documentProcessor.healthcheck.periodSeconds }}
          timeoutSeconds: {{ .Values.documentProcessor.healthcheck.timeoutSeconds }}
          failureThreshold: {{ .Values.documentProcessor.healthcheck.failureThreshold }}
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - "pgrep -f 'python -m src.document_processor.app' > /dev/null"
          initialDelaySeconds: {{ .Values.documentProcessor.healthcheck.initialDelaySeconds }}
          periodSeconds: {{ .Values.documentProcessor.healthcheck.periodSeconds }}
          timeoutSeconds: {{ .Values.documentProcessor.healthcheck.timeoutSeconds }}
          failureThreshold: {{ .Values.documentProcessor.healthcheck.failureThreshold }}
        {{- end }}
      volumes:
      - name: app-secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ include "colpali-stack.fullname" . }}-keyvault
{{- end }}
