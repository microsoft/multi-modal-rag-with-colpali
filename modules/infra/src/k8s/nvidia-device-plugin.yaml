#
# NVIDIA Device Plugin DaemonSet for Kubernetes GPU scheduling.
# This enables pods to request nvidia.com/gpu resources and schedules them on GPU nodes.
# Deployed as cluster infrastructure - runs on all GPU nodes regardless of application workloads.
#
# Prerequisites:
#   - gpu-resources namespace must exist (apply gpu-resources-namespace.yaml first)
#   - GPU nodes must have label: sku=gpu
#
# Apply with:
#   kubectl apply -f nvidia-device-plugin.yaml
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvidia-device-plugin-daemonset
  namespace: gpu-resources
  labels:
    app.kubernetes.io/name: nvidia-device-plugin
    app.kubernetes.io/component: gpu-infrastructure
spec:
  selector:
    matchLabels:
      name: nvidia-device-plugin-ds
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        name: nvidia-device-plugin-ds
    spec:
      nodeSelector:
        sku: gpu
      tolerations:
      - operator: "Exists"  # Tolerate all taints - runs on any GPU node
      # Mark this pod as a critical add-on; when enabled, the critical add-on
      # scheduler reserves resources for critical add-on pods so that they can
      # be rescheduled after a failure.
      priorityClassName: "system-node-critical"
      containers:
      - image: nvcr.io/nvidia/k8s-device-plugin:v0.18.0
        name: nvidia-device-plugin-ctr
        env:
          - name: FAIL_ON_INIT_ERROR
            value: "false"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        volumeMounts:
        - name: device-plugin
          mountPath: /var/lib/kubelet/device-plugins
      volumes:
      - name: device-plugin
        hostPath:
          path: /var/lib/kubelet/device-plugins
