# Shared service account for all ColPali stack components
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "colpali-stack.fullname" . }}-sa
  labels:
    {{- include "colpali-stack.labels" . | nindent 4 }}
    azure.workload.identity/use: "true"
  annotations:
    azure.workload.identity/client-id: {{ .Values.aksIdentityClientId }}
