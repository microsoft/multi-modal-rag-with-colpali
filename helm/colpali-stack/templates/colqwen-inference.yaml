{{- if .Values.colqwenInference.enabled }}
# StorageClass for Premium SSD backed storage
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: model-storage
  labels:
    app: {{ include "colpali-stack.fullname" . }}
  annotations:
    "helm.sh/resource-policy": keep
    "helm.sh/hook-weight": "-5"
provisioner: disk.csi.azure.com
parameters:
  # Premium SSD backed storage
  skuName: Premium_LRS
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer
allowVolumeExpansion: true
---
# StatefulSet with individual PVCs for true multi-node scaling
# Each replica gets its own PVC and downloads its own model copy
# Allows horizontal scaling across multiple nodes
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "colpali-stack.fullname" . }}-colqwen-inference
  labels:
    app: {{ include "colpali-stack.fullname" . }}-colqwen-inference
spec:
  replicas: {{ .Values.colqwenInference.replicaCount }}
  serviceName: {{ include "colpali-stack.fullname" . }}-colqwen-inference
  selector:
    matchLabels:
      app: {{ include "colpali-stack.fullname" . }}-colqwen-inference
  template:
    metadata:
      labels:
        app: {{ include "colpali-stack.fullname" . }}-colqwen-inference
    spec:
      serviceAccountName: {{ include "colpali-stack.fullname" . }}-sa
      securityContext:
        fsGroup: 1000  # Ensure volume is writable by container user
      nodeSelector:
        kubernetes.azure.com/agentpool: cpupool
        # For GPU nodes, use:
        # kubernetes.azure.com/agentpool: gpupool
      # Uncomment toleration when using GPU nodes with taint (sku=gpu:NoSchedule):
      # tolerations:
      # - key: "sku"
      #   operator: "Equal"
      #   value: "gpu"
      #   effect: "NoSchedule"
      # InitContainer downloads the model once per pod startup
      initContainers:
      - name: model-downloader
        image: "{{ .Values.acrServer }}/colqwen-inference:{{ .Values.colqwenInference.imageTag }}"
        command: ["python", "-m", "src.app", "download"]
        env:
        - name: MODEL_ID
          value: "vidore/colqwen2-v1.0-hf"
        - name: MODEL_DIRECTORY_PATH
          value: "/mnt/models/hf"
        - name: HF_HOME
          value: "/mnt/models/hf"
        - name: LOG_LEVEL
          value: "INFO"
        - name: OTEL_SERVICE_NAME
          value: "colqwen-model-downloader"
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: {{ include "colpali-stack.fullname" . }}-app-secrets
              key: connection-string
        resources:
          requests:
            memory: "4Gi"
            cpu: "500m"
          limits:
            memory: "8Gi"
            cpu: "1"
        volumeMounts:
        - name: model-storage
          mountPath: /mnt/models/hf
        - name: app-secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true

      # Main container serves inference after model is downloaded
      containers:
      - name: colqwen-inference
        image: "{{ .Values.acrServer }}/colqwen-inference:{{ .Values.colqwenInference.imageTag }}"
        env:
        - name: MODEL_ID
          value: "vidore/colqwen2-v1.0-hf"
        - name: MODEL_DIRECTORY_PATH
          value: "/mnt/models/hf"
        - name: HF_HOME
          value: "/mnt/models/hf"
        - name: LOG_LEVEL
          value: "INFO"
        - name: OTEL_SERVICE_NAME
          value: "colqwen-inference"
        - name: APPLICATIONINSIGHTS_CONNECTION_STRING
          valueFrom:
            secretKeyRef:
              name: {{ include "colpali-stack.fullname" . }}-app-secrets
              key: connection-string
        resources:
          requests:
            memory: {{ .Values.colqwenInference.resources.requests.memory }}
            cpu: {{ .Values.colqwenInference.resources.requests.cpu }}
          limits:
            memory: {{ .Values.colqwenInference.resources.limits.memory }}
            cpu: {{ .Values.colqwenInference.resources.limits.cpu }}
        ports:
        - containerPort: 8080
          name: http
        volumeMounts:
        - name: model-storage
          mountPath: /mnt/models/hf
          readOnly: true
        - name: app-secrets-store
          mountPath: "/mnt/secrets-store"
          readOnly: true
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 120
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 10
      volumes:
      - name: app-secrets-store
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: {{ include "colpali-stack.fullname" . }}-keyvault
  volumeClaimTemplates:
  - metadata:
      name: model-storage
      labels:
        app: {{ include "colpali-stack.fullname" . }}-colqwen-inference
    spec:
      accessModes: ["ReadWriteOnce"]
      storageClassName: "model-storage"
      resources:
        requests:
          storage: {{ .Values.colqwenInference.model.storageSize }}
---
# Service for ColQwen inference pods
apiVersion: v1
kind: Service
metadata:
  name: {{ include "colpali-stack.fullname" . }}-colqwen-inference
  labels:
    app: {{ include "colpali-stack.fullname" . }}-colqwen-inference
spec:
  type: {{ .Values.colqwenInference.service.type }}
  ports:
  - port: {{ .Values.colqwenInference.service.port }}
    targetPort: {{ .Values.colqwenInference.service.targetPort }}
    protocol: TCP
    name: http
  selector:
    app: {{ include "colpali-stack.fullname" . }}-colqwen-inference
{{- end }}
