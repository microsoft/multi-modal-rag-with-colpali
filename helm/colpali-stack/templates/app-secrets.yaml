# SecretProviderClass for Azure Key Vault integration
# Note: The Kubernetes Secret will be automatically created by the CSI driver
# when a pod mounts this SecretProviderClass
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: {{ include "colpali-stack.fullname" . }}-keyvault
  labels:
    {{- include "colpali-stack.labels" . | nindent 4 }}
    app.kubernetes.io/component: keyvault
spec:
  provider: azure
  secretObjects:
  - secretName: {{ include "colpali-stack.fullname" . }}-app-secrets
    type: Opaque
    data:
    - objectName: {{ .Values.keyVault.qdrantApiKeySecretName | default "qdrant-api-key" }}
      key: api-key
    - objectName: {{ .Values.keyVault.qdrantReadOnlyApiKeySecretName | default "qdrant-readonly-api-key" }}
      key: readonly-api-key
    - objectName: {{ .Values.keyVault.applicationInsightsConnectionStringSecretName | default "appinsights-connection-string" }}
      key: connection-string
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: {{ .Values.aksIdentityClientId }}
    keyvaultName: {{ .Values.keyVault.name }}
    tenantId: {{ .Values.tenantId }}
    cloudName: ""
    objects: |
      array:
        - |
          objectName: {{ .Values.keyVault.qdrantApiKeySecretName | default "qdrant-api-key" }}
          objectType: secret
          objectVersion: ""
        - |
          objectName: {{ .Values.keyVault.qdrantReadOnlyApiKeySecretName | default "qdrant-readonly-api-key" }}
          objectType: secret
          objectVersion: ""
        - |
          objectName: {{ .Values.keyVault.applicationInsightsConnectionStringSecretName | default "appinsights-connection-string" }}
          objectType: secret
          objectVersion: ""
