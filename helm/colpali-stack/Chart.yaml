apiVersion: v2
name: colpali-stack
description: Simple ColPali Stack - Qdrant + Ingress + Document Processor
version: 0.1.0

dependencies:
  - name: qdrant
    version: "1.15.5"
    repository: "https://qdrant.github.io/qdrant-helm"
    condition: qdrant.enabled
  - name: ingress-nginx
    version: "4.8.3"
    repository: "https://kubernetes.github.io/ingress-nginx"
    condition: ingress-nginx.enabled
